services:
  chroma:
    # Chroma runs as a sidecar so the docserver and the ingestion worker
    # subprocess can both talk to a single owner of /chroma-data. Two
    # PersistentClient instances on the same path corrupt the SQLite
    # store backing Chroma 1.5.x (chroma-core/chroma#5868); the HTTP
    # server serialises access correctly.
    # Pinned to 1.5.8 — latest stable on Docker Hub at time of writing
    # (1.5.9 is still in dev). Chroma's wire protocol is stable across patch
    # versions, so the docserver's 1.5.5 Python client talks to this fine.
    image: chromadb/chroma:1.5.8
    container_name: unified-documentation-chroma
    restart: unless-stopped
    command: ["run", "--path", "/chroma-data", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - chroma-data:/chroma-data
    expose:
      - "8000"
    mem_limit: 256m
    mem_reservation: 100m
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/127.0.0.1/8000"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  docserver:
    image: ghcr.io/johnmathews/unified-documentation-server:latest
    container_name: unified-documentation-server
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      chroma:
        condition: service_healthy
    # Memory budget on a 1.95 GB host (infra VM) sharing RAM with the
    # observability stack (Loki, Grafana, Alloy, exporters):
    #   - Server steady state ~250 MB (Python + FastMCP + Anthropic SDK + Chroma HTTP client)
    #   - Search-time ONNX model load adds ~110 MB
    #   - Ingestion worker subprocess can spike past 1 GB during embedding
    # 768 MB caps the container below the VM's available memory so the
    # cgroup OOM kills the highest-RSS process (the worker subprocess) cleanly,
    # before the kernel global OOM fires and degrades the whole host.
    # mem_reservation is the steady-state floor, NOT the peak — keep it low so
    # Docker's scheduler doesn't pre-commit RAM that's only used during ingest.
    # Do NOT raise mem_limit above the VM's available RAM, otherwise the
    # cgroup limit can never trigger and every spike becomes a global OOM.
    mem_limit: 768m
    mem_reservation: 256m
    ports:
      - "8085:8080"
    volumes:
      # Persistent data (SQLite + git clones + cached ONNX model). Chroma
      # vectors live in the chroma-data volume mounted on the chroma
      # service above.
      - docserver-data:/data
      # Configuration. Edit config/sources.yaml on the host (start from
      # config/sources.example.yaml).
      - ./config/sources.yaml:/config/sources.yaml:ro
      # Optional: bind-mount a host directory you want indexed as a local
      # source. Add a matching entry under `sources:` in
      # config/sources.yaml whose `path:` is the container-side path
      # (e.g. /repos/my-docs). Uncomment + adjust on the host that
      # actually has the directory.
      # - /srv/infra/mkdocs/docs:/repos/home-server-docs:ro
    environment:
      # How often (seconds) the server checks sources for new/changed docs.
      # Each cycle: git fetch for remote repos, content-hash check for local dirs.
      # Remote sources whose HEAD did not advance skip the file walk entirely,
      # so a 30-minute cadence keeps log noise and CPU low while staying
      # responsive enough for personal documentation.
      - DOCSERVER_POLL_INTERVAL=1800
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Override the default chat LLM. Anthropic does NOT publish a -latest
      # alias for Opus 4 — set this to a version-pinned ID, e.g.
      # claude-opus-4-7 (current default), claude-opus-4-6, or
      # claude-sonnet-4-6 / claude-haiku-4-5 for cheaper inference.
      # - DOCSERVER_CHAT_MODEL=claude-opus-4-7
      # ChromaDB sidecar location. Resolved by Docker's internal DNS to
      # the chroma service above. Leave unset for tests (falls back to
      # in-process PersistentClient).
      - DOCSERVER_CHROMA_HOST=chroma
      - DOCSERVER_CHROMA_PORT=8000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  documentation-webapp:
    image: ghcr.io/johnmathews/unified-documentation-webapp:latest
    container_name: documentation-webapp
    restart: unless-stopped
    # Stateless SvelteKit proxy. Steady state ~50 MB; bounded per-request
    # buffer of one downloaded file (max 5 MB) for inline rendering.
    mem_limit: 192m
    mem_reservation: 64m
    ports:
      - "3002:3000"
    environment:
      - API_URL=http://docserver:8080
    depends_on:
      docserver:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  docserver-data:
  chroma-data:
