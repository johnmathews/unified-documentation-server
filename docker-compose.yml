services:
  docserver:
    image: ghcr.io/johnmathews/unified-documentation-server:latest
    container_name: unified-documentation-server
    restart: unless-stopped
    stop_grace_period: 30s
    # A healthy steady state is ~150 MB (ONNX embedding model ~110 MB +
    # ChromaDB + SQLite + Python). 512 MB gives ~3x headroom for transient
    # ingestion spikes. If exceeded, Docker OOM-kills the container cleanly
    # so it cannot starve other services on the host (it restarts via
    # unless-stopped). Do NOT raise this without also raising the infra VM
    # RAM — on a 1.95 GB host, larger limits risk host-wide memory starvation.
    mem_limit: 512m
    mem_reservation: 200m
    ports:
      - "8085:8080"
    volumes:
      # Persistent data (SQLite + ChromaDB + git clones)
      - docserver-data:/data
      # Configuration
      - ./config/sources.yaml:/config/sources.yaml:ro
      # Home server docs (mkdocs source on infra VM)
      - /srv/infra/mkdocs/docs:/repos/home-server-docs:ro
    environment:
      # How often (seconds) the server checks sources for new/changed docs.
      # Each cycle: git fetch for remote repos, content-hash check for local dirs.
      - DOCSERVER_POLL_INTERVAL=300
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Override the default chat LLM. Anthropic does NOT publish a -latest
      # alias for Opus 4 — set this to a version-pinned ID, e.g.
      # claude-opus-4-7 (current default), claude-opus-4-6, or
      # claude-sonnet-4-6 / claude-haiku-4-5 for cheaper inference.
      # - DOCSERVER_CHAT_MODEL=claude-opus-4-7
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  documentation-webapp:
    image: ghcr.io/johnmathews/unified-documentation-webapp:latest
    container_name: documentation-webapp
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - API_URL=http://docserver:8080
    depends_on:
      - docserver
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  docserver-data:
